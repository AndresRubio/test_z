<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Assistant — test console</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
<style>
  :root {
    --brand-primary: #237803;
    --brand-primary-hover: #1c5e02;
    --brand-primary-soft: #f1fce8;
    --brand-primary-border: #daefc8;
    --brand-accent: #ffda00;
    --promo: #c41016;
    --promo-soft: #fff6d1;
    --rating: #dc7d05;
    --success: #037d58;
    --error: #bf2b2b;
    --error-soft: #fbd5d7;
    --text: #343332;
    --text-subtle: #706e6a;
    --surface: #ffffff;
    --page: #faf8f5;
    --border: #e5e2dc;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    display: flex;
    flex-direction: column;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    background:
      radial-gradient(60rem 16rem at 50% -5rem, #fffbe0 0%, rgba(255, 251, 224, 0) 70%),
      var(--page);
  }
  header {
    background: var(--brand-accent);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1rem;
    box-shadow: 0 1px 10px rgba(52, 51, 50, 0.12);
    position: relative;
    z-index: 1;
  }
  .header-inner {
    max-width: 56rem;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .header-inner h1 { font-size: 1.1rem; margin: 0; font-weight: 700; letter-spacing: -0.01em; }
  .header-inner h1 .paw { margin-right: 0.35rem; }
  .header-inner label {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.9rem;
    margin-left: auto;
  }
  select {
    font: inherit;
    padding: 0.25rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    background: var(--surface);
  }
  .pill {
    font-size: 0.78rem;
    padding: 0.15rem 0.6rem;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-subtle);
  }
  .pill.ok { color: var(--success); border-color: var(--success); }
  .pill.bad { color: var(--error); border-color: var(--error); }
  #banner {
    max-width: 56rem;
    margin: 1rem auto 0;
    padding: 0.75rem 1rem;
    background: var(--error-soft);
    color: var(--error);
    border: 1px solid var(--error);
    border-radius: 0.5rem;
  }
  #banner button { margin-left: 0.75rem; }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
  }
  #transcript {
    max-width: 56rem;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
  }
  #empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-subtle);
    padding: 2.5rem 1rem;
  }
  #empty-state .mark {
    width: 4.5rem;
    height: 4.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    font-size: 2rem;
    background: var(--brand-primary-soft);
    border: 1px solid var(--brand-primary-border);
    border-radius: 50%;
  }
  #empty-state h2 {
    font-size: 1.05rem;
    font-weight: 650;
    color: var(--text);
    margin: 0 0 0.3rem;
  }
  #empty-state p { margin: 0; font-size: 0.88rem; }
  .bubble {
    padding: 0.7rem 1rem;
    border-radius: 1rem;
    max-width: 85%;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    box-shadow: 0 1px 3px rgba(52, 51, 50, 0.07);
    animation: rise 0.28s ease-out both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(0.4rem); }
    to { opacity: 1; transform: none; }
  }
  .bubble.user {
    align-self: flex-end;
    background: var(--brand-primary-soft);
    border: 1px solid var(--brand-primary-border);
    border-bottom-right-radius: 0.25rem;
  }
  .bubble.assistant {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 0.25rem;
    max-width: 100%;
  }
  .bubble.warning {
    align-self: center;
    background: var(--error-soft);
    color: var(--error);
    border: 1px solid var(--error);
    font-size: 0.9rem;
  }
  .meta {
    font-size: 0.75rem;
    color: var(--text-subtle);
    margin-bottom: 0.3rem;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(14rem, 1fr));
    gap: 0.6rem;
    margin-top: 0.7rem;
  }
  .card {
    border: 1px solid var(--border);
    border-radius: 0.75rem;
    padding: 0.6rem 0.75rem;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    font-size: 0.85rem;
    box-shadow: 0 1px 2px rgba(52, 51, 50, 0.05);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(52, 51, 50, 0.12);
  }
  .card .name { font-weight: 600; }
  .card .variant, .card .brand { color: var(--text-subtle); }
  .card .price { font-weight: 700; font-size: 1rem; color: var(--brand-primary); }
  .badges { display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .badge {
    font-size: 0.72rem;
    padding: 0.1rem 0.45rem;
    border-radius: 999px;
    border: 1px solid currentColor;
  }
  .badge.pet { color: var(--brand-primary); background: var(--brand-primary-soft); }
  .badge.discount { color: var(--promo); background: var(--promo-soft); }
  .badge.stock-in { color: var(--success); }
  .badge.stock-out { color: var(--error); }
  .stars { color: var(--rating); }
  details.raw { margin-top: 0.6rem; font-size: 0.78rem; }
  details.raw summary { cursor: pointer; color: var(--text-subtle); }
  details.raw pre {
    overflow-x: auto;
    background: var(--page);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    padding: 0.6rem;
  }
  .dots { display: inline-flex; gap: 0.3rem; padding: 0.2rem 0; }
  .dots span {
    width: 0.45rem;
    height: 0.45rem;
    border-radius: 50%;
    background: var(--brand-primary);
    animation: bounce 1s infinite ease-in-out;
  }
  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: none; opacity: 0.45; }
    30% { transform: translateY(-0.3rem); opacity: 1; }
  }
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0.75rem 1rem;
    box-shadow: 0 -1px 10px rgba(52, 51, 50, 0.06);
  }
  #composer {
    max-width: 56rem;
    margin: 0 auto;
    display: flex;
    gap: 0.5rem;
  }
  #query-input {
    flex: 1;
    font: inherit;
    padding: 0.55rem 0.9rem;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface);
    box-shadow: inset 0 1px 2px rgba(52, 51, 50, 0.05);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  #query-input:focus {
    outline: none;
    border-color: var(--brand-primary);
    box-shadow: 0 0 0 3px rgba(35, 120, 3, 0.18);
  }
  #send-btn {
    font: inherit;
    font-weight: 600;
    color: #fff;
    background: var(--brand-primary);
    border: none;
    border-radius: 999px;
    padding: 0.55rem 1.3rem;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  #send-btn:hover:not(:disabled) {
    background: var(--brand-primary-hover);
    transform: translateY(-1px);
  }
  #send-btn:focus-visible, #query-input:focus-visible {
    outline: 2px solid var(--brand-primary);
    outline-offset: 2px;
  }
  #send-btn:disabled, #query-input:disabled { opacity: 0.55; cursor: not-allowed; }
  @media (prefers-reduced-motion: reduce) {
    .bubble { animation: none; }
    .dots span { animation: none; opacity: 0.7; }
    .card, #send-btn, #query-input { transition: none; }
    .card:hover, #send-btn:hover:not(:disabled) { transform: none; }
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <h1><span class="paw">🐾</span>Assistant test console</h1>
    <label>Site
      <select id="site-select" disabled></select>
    </label>
    <span id="status-pill" class="pill">checking…</span>
  </div>
</header>
<div id="banner" hidden>
  Server not reachable — is <code>uv run uvicorn app.main:app</code> running?
  <button id="retry-btn">Retry</button>
</div>
<main>
  <div id="empty-state">
    <div class="mark">🐾</div>
    <h2>Ask about products</h2>
    <p>Answers arrive in the Site's locale, with the product cards they're based on.</p>
  </div>
  <div id="transcript"></div>
</main>
<footer>
  <form id="composer">
    <input id="query-input" placeholder="Ask about products…" maxlength="2000"
           autocomplete="off" disabled>
    <button id="send-btn" type="submit" disabled>Send
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M2 8h11M9.5 3.5 14 8l-4.5 4.5" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </form>
</footer>
<script>
  const siteSelect = document.getElementById("site-select");
  const statusPill = document.getElementById("status-pill");
  const banner = document.getElementById("banner");
  const transcript = document.getElementById("transcript");
  const composer = document.getElementById("composer");
  const queryInput = document.getElementById("query-input");
  const sendBtn = document.getElementById("send-btn");
  const emptyState = document.getElementById("empty-state");

  function setBusy(busy) {
    queryInput.disabled = busy;
    sendBtn.disabled = busy;
    siteSelect.disabled = busy;
    if (!busy) queryInput.focus();
  }

  function addBubble(cls, node) {
    emptyState.hidden = true;
    const bubble = document.createElement("div");
    bubble.className = "bubble " + cls;
    bubble.append(node);
    transcript.append(bubble);
    bubble.scrollIntoView({ block: "end" });
    return bubble;
  }

  function textNode(text) {
    return document.createTextNode(text);
  }

  // The Generator emits markdown-style **bold**; render it as <strong> via
  // DOM nodes (never innerHTML). Unbalanced markers are restored verbatim.
  function answerNode(text) {
    const frag = document.createDocumentFragment();
    const parts = text.split("**");
    const balanced = parts.length % 2 === 1;
    parts.forEach((part, i) => {
      if (balanced && i % 2 === 1) {
        const strong = document.createElement("strong");
        strong.textContent = part;
        frag.append(strong);
      } else {
        frag.append(textNode((!balanced && i > 0 ? "**" : "") + part));
      }
    });
    return frag;
  }

  function typingDots() {
    const dots = document.createElement("span");
    dots.className = "dots";
    dots.setAttribute("role", "status");
    dots.setAttribute("aria-label", "Assistant is thinking");
    for (let i = 0; i < 3; i++) dots.append(document.createElement("span"));
    return dots;
  }

  function formatPrice(price, currency) {
    try {
      return new Intl.NumberFormat(undefined, { style: "currency", currency }).format(price);
    } catch {
      return price + " " + currency;
    }
  }

  function renderCard(card) {
    const el = document.createElement("div");
    el.className = "card";

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = card.product_name;
    el.append(name);

    const variant = document.createElement("div");
    variant.className = "variant";
    variant.textContent = card.variant_name;
    el.append(variant);

    const brand = document.createElement("div");
    brand.className = "brand";
    brand.textContent = card.brand;
    el.append(brand);

    const price = document.createElement("div");
    price.className = "price";
    price.textContent = formatPrice(card.price, card.currency);
    el.append(price);

    if (card.rating_average !== null) {
      const stars = document.createElement("div");
      stars.className = "stars";
      stars.textContent =
        "★ " + card.rating_average.toFixed(1) + " (" + card.rating_count + ")";
      el.append(stars);
    }

    const badges = document.createElement("div");
    badges.className = "badges";
    const pet = document.createElement("span");
    pet.className = "badge pet";
    pet.textContent = card.pet_type;
    badges.append(pet);
    if (card.discount_label) {
      const discount = document.createElement("span");
      discount.className = "badge discount";
      discount.textContent = card.discount_label;
      badges.append(discount);
    }
    const stock = document.createElement("span");
    stock.className = "badge " + (card.in_stock ? "stock-in" : "stock-out");
    stock.textContent = card.in_stock ? "In stock" : "Out of stock";
    badges.append(stock);
    el.append(badges);

    return el;
  }

  function renderAnswer(siteId, body) {
    const wrap = document.createElement("div");

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent =
      "Site " + siteId + " · " + body.retrieved_products.count + " product(s) retrieved";
    wrap.append(meta);

    wrap.append(answerNode(body.answer));

    if (body.retrieved_products.count > 0) {
      const cards = document.createElement("div");
      cards.className = "cards";
      for (const card of body.retrieved_products.products) {
        cards.append(renderCard(card));
      }
      wrap.append(cards);
    }

    const raw = document.createElement("details");
    raw.className = "raw";
    const summary = document.createElement("summary");
    summary.textContent = "raw JSON";
    const pre = document.createElement("pre");
    pre.textContent = JSON.stringify(body, null, 2);
    raw.append(summary, pre);
    wrap.append(raw);

    addBubble("assistant", wrap);
  }

  async function readSse(response, handlers) {
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    for (;;) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      let sep;
      while ((sep = buffer.indexOf("\n\n")) !== -1) {
        const frame = buffer.slice(0, sep);
        buffer = buffer.slice(sep + 2);
        let event = "";
        let data = "";
        for (const line of frame.split("\n")) {
          if (line.startsWith("event: ")) event = line.slice(7);
          else if (line.startsWith("data: ")) data += line.slice(6);
        }
        if (event && data && handlers[event]) handlers[event](JSON.parse(data));
      }
    }
  }

  function renderStream(siteId) {
    // Builds the assistant bubble incrementally: meta + cards on `retrieved`,
    // answer text on `token`, raw-JSON details on `done`.
    const wrap = document.createElement("div");
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = "Site " + siteId + " · retrieving…";
    wrap.append(meta);
    // answerNode() returns a DocumentFragment: once appended its children are
    // flattened into `wrap` and the fragment itself is left empty, so it can't
    // be used as a live update target. Wrap it in a real element instead.
    const answer = document.createElement("div");
    answer.append(answerNode(""));
    wrap.append(answer);
    addBubble("assistant", wrap);

    let retrieved = { products: [], count: 0 };
    let text = "";
    return {
      retrieved(payload) {
        retrieved = payload.retrieved_products;
        meta.textContent = "Site " + siteId + " · " + retrieved.count + " product(s) retrieved";
        if (retrieved.count > 0) {
          const cards = document.createElement("div");
          cards.className = "cards";
          for (const card of retrieved.products) cards.append(renderCard(card));
          wrap.append(cards);
        }
      },
      token(payload) {
        text += payload.delta;
        answer.textContent = text;
      },
      done(payload) {
        meta.textContent = "Site " + siteId + " · " + retrieved.count + " product(s) retrieved";
        answer.textContent = payload.answer;
        const raw = document.createElement("details");
        raw.className = "raw";
        const summary = document.createElement("summary");
        summary.textContent = "raw JSON";
        const pre = document.createElement("pre");
        pre.textContent = JSON.stringify(
          { answer: payload.answer, retrieved_products: retrieved }, null, 2
        );
        raw.append(summary, pre);
        wrap.append(raw);
      },
      error(payload) {
        addBubble("warning", textNode(payload.detail));
      },
    };
  }

  async function loadHealth() {
    banner.hidden = true;
    statusPill.textContent = "checking…";
    statusPill.className = "pill";
    try {
      const response = await fetch("/health");
      if (!response.ok) throw new Error("health " + response.status);
      const health = await response.json();
      const prevSite = siteSelect.value;
      siteSelect.replaceChildren(
        ...health.sites.map((siteId) => new Option("Site " + siteId, siteId))
      );
      if ([...siteSelect.options].some((o) => o.value === prevSite)) {
        siteSelect.value = prevSite;
      }
      const reachable = health.ollama === "reachable";
      statusPill.textContent = reachable ? "Ollama: reachable" : "Ollama: unreachable";
      statusPill.className = "pill " + (reachable ? "ok" : "bad");
      setBusy(false);
    } catch {
      statusPill.textContent = "offline";
      statusPill.className = "pill bad";
      banner.hidden = false;
    }
  }

  composer.addEventListener("submit", async (event) => {
    event.preventDefault();
    const query = queryInput.value.trim();
    if (!query || !siteSelect.value) return;
    const siteId = Number(siteSelect.value);

    addBubble("user", textNode(query));
    setBusy(true);
    const typing = addBubble("assistant typing", typingDots());

    let response;
    try {
      response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ site_id: siteId, query, stream: true }),
      });
    } catch {
      // Genuine network failure: the request never got a response.
      typing.remove();
      addBubble("warning", textNode("Network error — server unreachable. Check the header status."));
      loadHealth(); // owns the composer's enabled state after a network error
      return;
    }

    typing.remove();
    if (response.ok) {
      const contentType = response.headers.get("content-type") || "";
      try {
        if (contentType.startsWith("text/event-stream")) {
          await readSse(response, renderStream(siteId));
        } else {
          // Fallback: server answered with plain JSON (e.g. older server).
          renderAnswer(siteId, await response.json());
        }
        queryInput.value = ""; // clear only once the reply is shown
      } catch {
        // The server responded, but the body was not the shape we expected.
        addBubble("warning", textNode("Unexpected response from server — the reply could not be read."));
      }
    } else {
      let detail = "HTTP " + response.status;
      try {
        const d = (await response.json()).detail;
        if (d) detail = typeof d === "string" ? d : JSON.stringify(d);
      } catch {}
      addBubble("warning", textNode(detail));
    }
    setBusy(false);
  });

  document.getElementById("retry-btn").addEventListener("click", loadHealth);
  loadHealth();
</script>
</body>
</html>
